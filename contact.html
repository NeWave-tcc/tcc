<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário de Contato</title>
    <link rel="stylesheet" href="Style/contact.css" />
  </head>
  <body>

    <a href="index.html"><div class="voltar"><img src="Images/seta.png"></div></a>

    <h1>Formulário de Contato</h1>
    <div class="formulario">
      <form action="https://api.staticforms.xyz/submit" method="post" class="form">
        <input type="hidden" name="accessKey" value="72cdb1a0-7578-47bc-b7b9-c859202ee8f0">
        <input type="hidden" name="redirectTo" value="https://newave-tcc.github.io/tcc/index.html">

      <label for="name">Nome</label>
      <input type="text" name="name" id="name" required autocomplete="false">
      <label for="email">E-mail</label>
      <input type="email" name="email" id="email" required autocomplete="false">
      <label for="message">Mensagem</label>
      <textarea name="message" id="message" required autocomplete="false"></textarea>
      <input type="hidden" name="_captcha" value="false"/>
      <button type="submit">Enviar</button>
    </form>
  </div>

  <script src="JS/contact.js"></script>

  </body>
</html>
